<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الدخول | المنظومة الذكية</title>
        <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

    <h2>تسجيل الدخول للمنظومة</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني" style="padding: 10px; margin: 5px;"><br>
    <input type="password" id="password" placeholder="كلمة المرور" style="padding: 10px; margin: 5px;"><br>
    <button onclick="loginUser()" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer;">دخول</button>

    <p id="message" style="color: red;"></p>

    <script src="app.js"></script>
</body>
</html>
