<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الرقابة والتحليل | المنظومة المدرسية الذكية</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background-color: #f8f9fa; 
        }
        .sidebar { 
            width: 250px; 
            background: #2c3e50; 
            color: white; 
            position: fixed; 
            height: 100%; 
            padding-top: 20px; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar h2 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 30px;
        }
        .sidebar a { 
            display: block; 
            color: white; 
            padding: 15px 20px; 
            text-decoration: none; 
            font-size: 16px; 
            border-bottom: 1px solid #34495e;
        }
        .sidebar a:hover { 
            background: #1abc9c; 
            transition: 0.3s;
        }
        .content { 
            margin-right: 250px; 
            padding: 30px; 
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .card-container { 
            display: flex; 
            gap: 20px; 
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            flex: 1; 
            text-align: center; 
            border-top: 4px solid #1abc9c;
        }
        .card h3 { 
            margin: 0; 
            color: #7f8c8d; 
            font-size: 16px;
        }
        .card p { 
            font-size: 28px; 
            font-weight: bold; 
            color: #2c3e50; 
            margin: 10px 0 0; 
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <h2>المنظومة المدرسية الذكية</h2>
        <a href="#">📊 لوحة التحكم</a>
        <a href="#">👨‍🎓 إدارة الطلاب</a>
        <a href="#">👨‍🏫 إدارة الأساتذة</a>
        <a href="#">🤖 تحليل الذكاء الاصطناعي</a>
        <a href="index.html" style="margin-top: 50px; color: #e74c3c;">🚪 تسجيل الخروج</a>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="content">
        <div class="header">
            <h1>مرحباً بك في مركز الرقابة</h1>
            <p>تحديث مباشر 🟢</p>
        </div>
        
        <div class="card-container">
            <div class="card">
                <h3>إجمالي الطلاب</h3>
                <p id="total-students">--</p>
            </div>
            <div class="card">
                <h3>معدل الحضور اليوم</h3>
                <p id="attendance-rate">--</p>
            </div>
            <div class="card" style="border-top-color: #e74c3c;">
                <h3>تنبيهات النظام</h3>
                <p id="system-alerts">--</p>
            </div>
        </div>
    </div>

</body>
</html>
