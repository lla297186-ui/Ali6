<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الرقابة | المنظومة المدرسية الذكية</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f4f8; display: flex; min-height: 100vh; }
        
        /* القائمة الجانبية */
        .sidebar {
            width: 260px; background-color: #1e3a8a; color: white; display: flex; flex-direction: column;
            position: fixed; height: 100%; right: 0; top: 0; box-shadow: -4px 0 15px rgba(0,0,0,0.1); z-index: 100;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 20px; font-weight: bold; margin-top: 10px; }
        .sidebar-header i { font-size: 30px; color: #10b981; }
        
        .nav-links { list-style: none; padding: 20px 0; flex-grow: 1; }
        .nav-links li a { display: flex; align-items: center; padding: 15px 25px; color: #cbd5e1; text-decoration: none; font-size: 16px; transition: 0.3s; }
        .nav-links li a i { margin-left: 15px; font-size: 18px; width: 25px; text-align: center; }
        .nav-links li a:hover, .nav-links li a.active { background-color: rgba(255,255,255,0.1); color: white; border-right: 4px solid #10b981; }
        
        .logout-btn { padding: 15px 25px; color: #fca5a5; text-decoration: none; display: flex; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .logout-btn:hover { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .logout-btn i { margin-left: 15px; }

        /* المحتوى الرئيسي */
        .main-content { flex-grow: 1; margin-right: 260px; padding: 30px; transition: 0.3s; }
        
        /* ترويسة المحتوى والتحديث المباشر */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: #1e293b; font-size: 24px; }
        .live-badge { background-color: #d1fae5; color: #059669; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .live-badge .dot { width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* الكروت (الإحصائيات) */
        .cards-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #1e3a8a; }
        .card.green { border-bottom-color: #10b981; }
        .card.red { border-bottom-color: #ef4444; }
        .card-info h3 { color: #64748b; font-size: 14px; margin-bottom: 8px; }
        .card-info p { color: #0f172a; font-size: 28px; font-weight: bold; }
        .card-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .card.blue .card-icon { background-color: #eff6ff; color: #3b82f6; }
        .card.green .card-icon { background-color: #ecfdf5; color: #10b981; }
        .card.red .card-icon { background-color: #fef2f2; color: #ef4444; }

        /* التوافق مع الهواتف (Responsive) */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; display: block; box-shadow: none; border-bottom: 2px solid #1e293b; }
            .nav-links { display: flex; flex-wrap: wrap; justify-content: center; padding: 10px 0; }
            .nav-links li a { padding: 10px 15px; font-size: 14px; border: none; }
            .nav-links li a i { display: none; }
            .nav-links li a.active { border-bottom: 3px solid #10b981; border-right: none; }
            .logout-btn { justify-content: center; padding: 15px; }
            .main-content { margin-right: 0; padding: 15px; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-school"></i>
            <h2>المنظومة الذكية</h2>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class="fa-solid fa-chart-line"></i> مركز الرقابة</a></li>
            <li><a href="#"><i class="fa-solid fa-user-graduate"></i> إدارة الطلاب</a></li>
            <li><a href="#"><i class="fa-solid fa-qrcode"></i> توليد الهويات (QR)</a></li>
            <li><a href="#"><i class="fa-solid fa-brain"></i> تحليل النظام بالذكاء الاصطناعي</a></li>
        </ul>
        <a href="index.html" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
        </a>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>مرحباً بك، مدير النظام 👋</h1>
            <div class="live-badge">
                <div class="dot"></div> متصل - تحديث مباشر
            </div>
        </div>

        <div class="cards-container">
            <div class="card blue">
                <div class="card-info">
                    <h3>إجمالي الطلاب</h3>
                    <p id="total-students">--</p>
                </div>
                <div class="card-icon"><i class="fa-solid fa-users"></i></div>
            </div>

            <div class="card green">
                <div class="card-info">
                    <h3>حضور اليوم</h3>
                    <p id="attendance-rate">--</p>
                </div>
                <div class="card-icon"><i class="fa-solid fa-check-circle"></i></div>
            </div>

            <div class="card red">
                <div class="card-info">
                    <h3>غيابات وإنذارات</h3>
                    <p id="system-alerts">--</p>
                </div>
                <div class="card-icon"><i class="fa-solid fa-bell"></i></div>
            </div>
        </div>
    </main>

</body>
</html>
